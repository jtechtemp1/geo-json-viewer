name: upload-usd-builder

on:
  workflow_dispatch:
    inputs:
      s3_key:
        description: "S3 key (default: single/usd_builder.py)"
        required: true
        default: "single/usd_builder.py"

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Upload usd_builder.py to S3
        run: |
          SRC="source/extensions/omni.geojson.loader/omni/geojson/loader/usd_builder.py"
          test -f "$SRC" || { echo "Source file not found: $SRC"; exit 1; }
          aws s3 cp "$SRC" "s3://${{ vars.EXT_BUILDS_BUCKET }}/${{ inputs.s3_key }}" \
            --only-show-errors
          echo "Uploaded to s3://${{ vars.EXT_BUILDS_BUCKET }}/${{ inputs.s3_key }}"
